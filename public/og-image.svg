<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF" />

  <!-- Precise Grid Lines (Linear inspired) -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#F3F4F6" stroke-width="1" />
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="#F3F4F6" stroke-width="1" />
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#F3F4F6" stroke-width="1" />
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#F3F4F6" stroke-width="1" />

  <!-- Corner Coordinates / Grid Intersections -->
  <path d="M75 80 H85 M80 75 V85" stroke="#E5E7EB" stroke-width="1" />
  <path d="M1115 80 H1125 M1120 75 V85" stroke="#E5E7EB" stroke-width="1" />
  <path d="M75 550 H85 M80 545 V555" stroke="#E5E7EB" stroke-width="1" />
  <path d="M1115 550 H1125 M1120 545 V555" stroke="#E5E7EB" stroke-width="1" />

  <!-- Left Indicator Bar -->
  <rect x="80" y="160" width="6" height="120" rx="3" fill="#2563EB" />

  <!-- Main Identity Header -->
  <text x="110" y="210" fill="#111827" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-0.03em">Mahija Ibad Pradipta</text>
  
  <!-- Sub-Identity URL -->
  <text x="110" y="260" fill="#2563EB" font-family="monospace" font-size="22" font-weight="600" letter-spacing="0.05em">HOSTED ON EEJA.FUN</text>

  <!-- Tags Container (Infrastructure, IoT, Fullstack, Edge AI) -->
  <g transform="translate(110, 340)">
    <!-- Tag 1: Infrastructure -->
    <rect x="0" y="0" width="170" height="36" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text x="85" y="23" fill="#4B5563" font-family="monospace" font-size="14" font-weight="600" text-anchor="middle">INFRASTRUCTURE</text>

    <!-- Tag 2: IoT -->
    <rect x="185" y="0" width="70" height="36" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text x="220" y="23" fill="#4B5563" font-family="monospace" font-size="14" font-weight="600" text-anchor="middle">IOT</text>

    <!-- Tag 3: Fullstack -->
    <rect x="270" y="0" width="130" height="36" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text x="335" y="23" fill="#4B5563" font-family="monospace" font-size="14" font-weight="600" text-anchor="middle">FULLSTACK</text>

    <!-- Tag 4: Edge AI -->
    <rect x="415" y="0" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text x="470" y="23" fill="#4B5563" font-family="monospace" font-size="14" font-weight="600" text-anchor="middle">EDGE AI</text>
  </g>

  <!-- Divider Line Above Footer -->
  <line x1="80" y1="460" x2="1120" y2="460" stroke="#E5E7EB" stroke-width="1" />

  <!-- Footer Specs (Debian 12, Docker, Cloudflared) -->
  <text x="110" y="505" fill="#9CA3AF" font-family="monospace" font-size="14" font-weight="600" letter-spacing="0.1em">DEBIAN 12</text>
  <circle cx="230" cy="500" r="3" fill="#D1D5DB" />
  
  <text x="260" y="505" fill="#9CA3AF" font-family="monospace" font-size="14" font-weight="600" letter-spacing="0.1em">DOCKER</text>
  <circle cx="350" cy="500" r="3" fill="#D1D5DB" />
  
  <text x="380" y="505" fill="#9CA3AF" font-family="monospace" font-size="14" font-weight="600" letter-spacing="0.1em">CLOUDFLARED</text>

  <!-- Right Side Decorative Element (Minimal wireframe diagram / coordinate matrix box) -->
  <g transform="translate(860, 160)" stroke="#E5E7EB" stroke-width="1">
    <rect width="260" height="260" rx="8" fill="#F9FAFB" />
    <!-- Fine lines within box mimicking tech grid -->
    <line x1="0" y1="65" x2="260" y2="65" stroke="#F3F4F6" />
    <line x1="0" y1="130" x2="260" y2="130" stroke="#F3F4F6" />
    <line x1="0" y1="195" x2="260" y2="195" stroke="#F3F4F6" />
    <line x1="65" y1="0" x2="65" y2="260" stroke="#F3F4F6" />
    <line x1="130" y1="0" x2="130" y2="260" stroke="#F3F4F6" />
    <line x1="195" y1="0" x2="195" y2="260" stroke="#F3F4F6" />
    
    <!-- Outer accent boxes -->
    <rect x="25" y="25" width="210" height="210" rx="4" fill="none" stroke="#E5E7EB" />
    <rect x="65" y="65" width="130" height="130" rx="2" fill="none" stroke="#E5E7EB" />
    
    <!-- Core Blue Anchor -->
    <circle cx="130" cy="130" r="6" fill="#2563EB" stroke="#FFFFFF" stroke-width="2" />
  </g>
</svg>
